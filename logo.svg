<svg width="100%" viewBox="0 0 1034 1034" xmlns="http://www.w3.org/2000/svg" role="img" style="margin: 0px auto;">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Magpie / Stash menubar app icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A 1024 by 1024 macOS-style squircle app icon. Deep graphite background, with two overlapping rounded rectangles centered: a cool gray back layer and a saturated blue accent top layer offset slightly up and to the right. Subtle inner highlights on each layer and a soft ambient shadow beneath.</desc>
