<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stash tray icon — COLOUR variant (opt-out of macOS template behaviour).
  A shrunk copy of logo.svg: graphite back card, saturated blue front
  card with subtle top highlight. Transparent background so the menubar
  vibrancy still reads through. 22x22 base; rsvg-convert regenerates
  22/44 PNGs from this.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- back card (graphite) -->
  <rect x="4.5" y="7.5" width="13" height="9" rx="1.9" ry="1.9" fill="#565E6B"/>
  <!-- ambient shadow beneath the front card -->
  <rect x="3.2" y="6.2" width="13" height="9" rx="1.9" ry="1.9" fill="#000000" fill-opacity="0.22"/>
  <!-- front card (accent blue) -->
  <rect x="3" y="6"   width="13" height="9" rx="1.9" ry="1.9" fill="#2F7AE5"/>
  <!-- subtle top highlight line -->
  <rect x="3.4" y="6.5" width="12.2" height="0.45" rx="0.22" fill="#FFFFFF" opacity="0.32"/>
</svg>
