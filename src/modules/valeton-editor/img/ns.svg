<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NAM profile">
<defs>
  <linearGradient id="nam-face" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#2c3441"/><stop offset=".55" stop-color="#1d232c"/><stop offset="1" stop-color="#141920"/>
  </linearGradient>
  <linearGradient id="nam-side" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#11151b"/><stop offset="1" stop-color="#090c10"/>
  </linearGradient>
  <linearGradient id="nam-gloss" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff" stop-opacity=".16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="nam-accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2f7fe0"/><stop offset="1" stop-color="#5ab0ff"/>
  </linearGradient>
  <radialGradient id="nam-led" cx=".4" cy=".34" r=".72">
    <stop offset="0" stop-color="#e4f2ff"/><stop offset=".4" stop-color="#5ab0ff"/><stop offset="1" stop-color="#1c4f8a"/>
  </radialGradient>
  <clipPath id="nam-clip"><rect x="30" y="34" width="128" height="128" rx="18"/></clipPath>
</defs>

<!-- extruded depth block (down-right) -->
<rect x="40" y="44" width="128" height="128" rx="18" fill="url(#nam-side)"/>

<!-- front face -->
<g clip-path="url(#nam-clip)">
  <rect x="30" y="34" width="128" height="128" fill="url(#nam-face)"/>
  <rect x="30" y="34" width="128" height="66" fill="url(#nam-gloss)"/>
</g>
<rect x="30" y="34" width="128" height="128" rx="18" fill="none" stroke="#3d4856" stroke-width="1.5"/>

<!-- status LED -->
<circle cx="49" cy="53" r="9" fill="#0a0d11"/>
<circle cx="49" cy="53" r="5.5" fill="url(#nam-led)"/>
<circle cx="49" cy="53" r="11" fill="none" stroke="#5ab0ff" stroke-opacity=".25" stroke-width="2"/>

<!-- brand -->
<text x="94" y="108" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="46" font-weight="800" letter-spacing="2" fill="url(#nam-accent)">NAM</text>
<rect x="62" y="120" width="64" height="4" rx="2" fill="url(#nam-accent)"/>
<text x="94" y="143" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
      font-size="12" font-weight="600" letter-spacing="4" fill="#7d8794">PROFILE</text>
</svg>
