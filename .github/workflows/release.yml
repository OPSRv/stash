name: Release

# Builds a universal macOS DMG on tag push (e.g. `git tag v0.1.0 && git push --tags`)
# and attaches it to a GitHub Release. The landing page's "Download" button
# points at /releases/latest, so every tag cut here becomes the canonical
# download URL without any manual link updates.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0) — required when running manually'
        required: true

permissions:
  contents: write

jobs:
  macos-universal:
    name: macOS universal build
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build universal macOS bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Stage release artifacts
        id: stage
        run: |
          set -e
          BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle
          mkdir -p release-assets
          # Grab the DMG (preferred) and fall back to the .app.tar.gz.
          if compgen -G "$BUNDLE/dmg/*.dmg" > /dev/null; then
            for f in "$BUNDLE"/dmg/*.dmg; do
              cp "$f" "release-assets/Stash_universal.dmg"
              break
            done
          fi
          if compgen -G "$BUNDLE/macos/*.app.tar.gz" > /dev/null; then
            for f in "$BUNDLE"/macos/*.app.tar.gz; do
              cp "$f" "release-assets/Stash_universal.app.tar.gz"
              break
            done
          fi
          ls -la release-assets

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/Stash_universal.dmg
            release-assets/Stash_universal.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
