name: Release

# Builds an arm64 macOS DMG on tag push (e.g. `git tag v0.1.0 && git push --tags`)
# and attaches it to a GitHub Release together with the diarization sidecar
# trio (sidecar binary + sherpa-onnx + ONNX Runtime dylibs). The main app no
# longer bundles those — Settings downloads them from this release on opt-in.
#
# Apple Silicon only: Stash dropped Intel-Mac support, which lets the bundle
# stay slim (no fat binaries) and removes a second `cargo build` per release.
#
# The landing page's "Download" button points at /releases/latest, so every
# tag cut here becomes the canonical download URL without manual link updates.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0) — required when running manually'
        required: true

permissions:
  contents: write

jobs:
  # PyInstaller bundle for the stem-separation + BPM sidecar
  # (Demucs + BeatNet, Python). Produced once per release tag, uploaded
  # both as a workflow artifact (so the main job can attach it to the
  # release) and never bundled inside the .app — it's ~280 MB and only
  # users who opt into Stems separation pay that cost.
  build-stash-separator:
    name: stash-separator (Demucs + BeatNet) PyInstaller bundle
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-stash-separator-${{ runner.os }}-${{ hashFiles('src-tauri/crates/stash-separator/requirements.txt') }}
          restore-keys: |
            pip-stash-separator-${{ runner.os }}-

      - name: Install runtime + PyInstaller
        working-directory: src-tauri/crates/stash-separator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'pyinstaller>=6.6,<7'

      - name: PyInstaller --onedir
        working-directory: src-tauri/crates/stash-separator
        run: |
          rm -rf build dist
          pyinstaller --noconfirm --clean stash-separator.spec
          ls -la dist/stash-separator | head -20

      # PyInstaller writes the bundle to dist/stash-separator/. We tar.gz
      # the *parent* of the bundle dir (so the archive contains the
      # `stash-separator/` directory at its root) — that way the
      # in-app extractor lands the binary at
      # `$APPLOCALDATA/separator/bin/stash-separator/stash-separator`
      # without any path massaging.
      - name: Pack tarball
        working-directory: src-tauri/crates/stash-separator
        run: |
          set -e
          # Strip extended attrs so the artifact stays small and the
          # `xattr -dr com.apple.quarantine` step the in-app extractor
          # runs starts from a clean slate.
          xattr -cr dist/stash-separator || true
          tar -C dist -czf stash-separator-macos-arm64.tar.gz stash-separator
          ls -la stash-separator-macos-arm64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: stash-separator-macos-arm64
          path: src-tauri/crates/stash-separator/stash-separator-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 7

  macos-arm64:
    name: macOS arm64 build
    needs: build-stash-separator
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # `sherpa-rs` (linked from the `stash-diarize` sidecar crate, *not*
      # from the main app) downloads its prebuilt dylibs into
      # `~/Library/Caches/sherpa-rs` on first build. Caching that dir keeps
      # the runner from re-downloading ~60 MB on every CI run. The cache
      # key includes Cargo.lock so a sherpa-rs version bump invalidates
      # cleanly.
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/sherpa-rs
          key: sherpa-rs-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sherpa-rs-${{ runner.os }}-

      - run: npm ci

      - name: Build main app bundle (arm64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
        run: npm run tauri build -- --target aarch64-apple-darwin

      # `stash-diarize` is a separate workspace member that links
      # sherpa-rs and runs out-of-process. We ship the binary plus the
      # two dylibs sherpa-rs's build script extracted into the cache —
      # the user downloads them on demand from this same release.
      - name: Build diarization sidecar
        working-directory: src-tauri
        run: cargo build -p stash-diarize --release --target aarch64-apple-darwin

      - name: Pull stash-separator artifact
        uses: actions/download-artifact@v4
        with:
          name: stash-separator-macos-arm64
          path: stash-separator-artifact

      - name: Stage release artifacts
        id: stage
        run: |
          set -e
          BUNDLE=src-tauri/target/aarch64-apple-darwin/release/bundle
          SIDECAR_DIR=src-tauri/target/aarch64-apple-darwin/release
          mkdir -p release-assets
          # Main app: prefer DMG, fall back to .app.tar.gz.
          if compgen -G "$BUNDLE/dmg/*.dmg" > /dev/null; then
            for f in "$BUNDLE"/dmg/*.dmg; do
              cp "$f" "release-assets/Stash_arm64.dmg"
              break
            done
          fi
          if compgen -G "$BUNDLE/macos/*.app.tar.gz" > /dev/null; then
            for f in "$BUNDLE"/macos/*.app.tar.gz; do
              cp "$f" "release-assets/Stash_arm64.app.tar.gz"
              break
            done
          fi
          # Diarization sidecar binary. Strip to drop debug info — the
          # downloader and the catalog `min_plausible_bytes` threshold
          # both expect the slim ~1 MB binary.
          cp "$SIDECAR_DIR/stash-diarize" release-assets/stash-diarize
          strip release-assets/stash-diarize || true
          # The dylibs sherpa-rs already extracted. Glob across the
          # cache so a sherpa-rs version bump doesn't break the path.
          # `lib/` is the canonical subdir inside each extracted archive.
          SHERPA_CACHE="$HOME/Library/Caches/sherpa-rs"
          SHERPA_LIB=$(find "$SHERPA_CACHE" -path "*/sherpa-onnx-*-shared/lib/libsherpa-onnx-c-api.dylib" | head -n 1)
          ONNX_LIB=$(find "$SHERPA_CACHE" -path "*/sherpa-onnx-*-shared/lib/libonnxruntime.1.17.1.dylib" | head -n 1)
          if [ -z "$SHERPA_LIB" ] || [ -z "$ONNX_LIB" ]; then
            echo "missing sherpa dylibs in $SHERPA_CACHE" >&2
            find "$SHERPA_CACHE" -type f | head -50 >&2
            exit 1
          fi
          cp "$SHERPA_LIB" release-assets/libsherpa-onnx-c-api.dylib
          cp "$ONNX_LIB" release-assets/libonnxruntime.1.17.1.dylib
          # stash-separator (Demucs + BeatNet PyInstaller bundle) was
          # built by the upstream `build-stash-separator` job and pulled
          # in via download-artifact above. The catalog filename in
          # `src-tauri/src/modules/separator/catalog.rs::SIDECAR.filename`
          # must match exactly.
          if [ -f "stash-separator-artifact/stash-separator-macos-arm64.tar.gz" ]; then
            cp "stash-separator-artifact/stash-separator-macos-arm64.tar.gz" \
               "release-assets/stash-separator-macos-arm64.tar.gz"
          fi
          ls -la release-assets

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          # Asset names match the catalog filenames in
          # src-tauri/src/modules/diarization/catalog.rs — the in-app
          # downloader fetches them by filename from this release.
          files: |
            release-assets/Stash_arm64.dmg
            release-assets/Stash_arm64.app.tar.gz
            release-assets/stash-diarize
            release-assets/libsherpa-onnx-c-api.dylib
            release-assets/libonnxruntime.1.17.1.dylib
            release-assets/stash-separator-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
