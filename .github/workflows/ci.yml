name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (Vitest + TSC)
    # Pinned to macos-14 (matches release.yml + nightly.yml). The
    # `macos-latest` image rolled to a newer arm64 SKU whose clang
    # advertises target feature `i8mm`, which causes whisper-rs-sys's
    # vendored ggml to fail compilation (4 always-inline errors on
    # `vmmlaq_s32`). Until whisper.cpp adds the i8mm feature flag,
    # pinning is the straightforward fix and keeps CI matched to the
    # bundle build.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test -- --run

  backend:
    name: Backend (cargo test)
    # Pinned to macos-14 (matches release.yml + nightly.yml). The
    # `macos-latest` image rolled to a newer arm64 SKU whose clang
    # advertises target feature `i8mm`, which causes whisper-rs-sys's
    # vendored ggml to fail compilation (4 always-inline errors on
    # `vmmlaq_s32`). Until whisper.cpp adds the i8mm feature flag,
    # pinning is the straightforward fix and keeps CI matched to the
    # bundle build.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Tauri needs a few system deps on macOS; they are preinstalled on the
      # GitHub runner image, so no extra steps are required here.
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --workspace -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

  e2e:
    name: E2E (Playwright smoke)
    # Pinned to macos-14 (matches release.yml + nightly.yml). The
    # `macos-latest` image rolled to a newer arm64 SKU whose clang
    # advertises target feature `i8mm`, which causes whisper-rs-sys's
    # vendored ggml to fail compilation (4 always-inline errors on
    # `vmmlaq_s32`). Until whisper.cpp adds the i8mm feature flag,
    # pinning is the straightforward fix and keeps CI matched to the
    # bundle build.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

