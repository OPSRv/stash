<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0C10"/>
      <stop offset="1" stop-color="#0A0B0E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#5FA0FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5FA0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.45">
      <stop offset="0" stop-color="#2F7AE5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2F7AE5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7FB3FF"/>
      <stop offset="1" stop-color="#2F7AE5"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo mark -->
  <g transform="translate(96 88)">
    <rect x="0" y="0" width="88" height="88" rx="20" fill="url(#accent)"/>
    <path d="M22 44 h44 M22 58 h30" stroke="#0A0B0E" stroke-width="6" stroke-linecap="round"/>
    <circle cx="66" cy="30" r="6" fill="#0A0B0E"/>
  </g>
  <text x="208" y="152" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="48" font-weight="700" fill="#F2F3F5" letter-spacing="-1">Stash</text>
  <text x="208" y="180" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#7FB3FF">opsrv.github.io/stash</text>

  <!-- headline -->
  <text x="96" y="310" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="92" font-weight="700" fill="#F2F3F5" letter-spacing="-3">Thirteen utilities.</text>
  <text x="96" y="410" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-3">
    <tspan fill="url(#accent)">One icon</tspan><tspan fill="#C8CBD1"> in your menu bar.</tspan>
  </text>

  <!-- sub -->
  <text x="96" y="470" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="26" fill="#9096A0">
    920×520 popup · clipboard · notes · AI · terminal · Pomodoro · …
  </text>

  <!-- keycaps -->
  <g transform="translate(96 520)">
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="26" font-weight="600" fill="#F2F3F5">
      <rect x="0" y="0" width="58" height="58" rx="10" fill="#1D2027" stroke="rgba(255,255,255,0.14)"/>
      <text x="29" y="39" text-anchor="middle">⌘</text>
      <rect x="70" y="0" width="58" height="58" rx="10" fill="#1D2027" stroke="rgba(255,255,255,0.14)"/>
      <text x="99" y="39" text-anchor="middle">⇧</text>
      <rect x="140" y="0" width="58" height="58" rx="10" fill="#1D2027" stroke="rgba(255,255,255,0.14)"/>
      <text x="169" y="39" text-anchor="middle">V</text>
    </g>
    <text x="220" y="38" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="22" fill="#7A7F89">show / hide the popup</text>
  </g>

  <!-- tags -->
  <g transform="translate(760 520)" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" font-weight="500">
    <g transform="translate(0 0)">
      <rect width="108" height="36" rx="8" fill="rgba(47,122,229,0.14)" stroke="rgba(47,122,229,0.32)"/>
      <text x="54" y="24" text-anchor="middle" fill="#5FA0FF">macOS 13+</text>
    </g>
    <g transform="translate(120 0)">
      <rect width="88" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)"/>
      <text x="44" y="24" text-anchor="middle" fill="#C8CBD1">Tauri 2</text>
    </g>
    <g transform="translate(220 0)">
      <rect width="124" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)"/>
      <text x="62" y="24" text-anchor="middle" fill="#C8CBD1">offline-first</text>
    </g>
  </g>
</svg>
